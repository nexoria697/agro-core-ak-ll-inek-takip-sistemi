<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agro Core | Akıllı Bileklik İzleme</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0b0f1a; color: #e2e8f0; font-family: 'Inter', sans-serif; }
        .stat-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); transition: transform 0.2s; }
        .stat-card:hover { transform: translateY(-5px); border-color: #10b981; }
        .status-dot { height: 10px; width: 10px; background-color: #10b981; border-radius: 50%; display: inline-block; margin-right: 8px; box-shadow: 0 0 10px #10b981; }
    </style>
</head>
<body class="min-h-screen p-6 md:p-12">
    <div class="max-w-5xl mx-auto flex justify-between items-center mb-12">
        <div>
            <h1 class="text-4xl font-extrabold tracking-tight text-white">Agro Core</h1>
            <p class="text-emerald-400 font-medium">Akıllı Sağlık ve Aktivite Takip Sistemi</p>
        </div>
        <div class="text-right hidden md:block">
            <div class="flex items-center text-sm font-medium text-emerald-400">
                <span class="status-dot"></span> Veri Akışı Aktif
            </div>
            <p class="text-xs text-slate-500 mt-1" id="last-update">Son güncelleme: --:--:--</p>
        </div>
    </div>

    <div class="max-w-5xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-8">
        
        <div class="stat-card p-8 rounded-3xl">
            <div class="flex justify-between items-start mb-6">
                <h3 class="text-lg font-semibold text-slate-400 uppercase tracking-wider">Vücut Sıcaklığı</h3>
                <span class="p-2 bg-emerald-500/10 rounded-lg text-emerald-400">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" />
                    </svg>
                </span>
            </div>
            <div class="flex items-baseline gap-2">
                <span class="text-7xl font-bold text-white" id="temp-val">--</span>
                <span class="text-3xl font-light text-slate-400">°C</span>
            </div>
            <div class="mt-8">
                <p class="text-sm text-slate-400 mb-2">Durum: <span id="temp-status" class="text-emerald-400 font-bold">Bekleniyor</span></p>
                <div class="w-full bg-slate-800 rounded-full h-2.5">
                    <div id="temp-bar" class="bg-emerald-500 h-2.5 rounded-full" style="width: 0%"></div>
                </div>
            </div>
        </div>

        <div class="stat-card p-8 rounded-3xl">
            <div class="flex justify-between items-start mb-6">
                <h3 class="text-lg font-semibold text-slate-400 uppercase tracking-wider">Hareket Aktivitesi</h3>
                <span class="p-2 bg-blue-500/10 rounded-lg text-blue-400">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" />
                    </svg>
                </span>
            </div>
            <div class="flex flex-col gap-1">
                <span class="text-5xl font-bold text-white" id="activity-status">--</span>
                <span class="text-lg text-blue-400 font-medium">Aktif Hareket</span>
            </div>
            <div class="mt-8 flex gap-2">
                <span class="px-3 py-1 bg-slate-800 rounded-md text-xs text-slate-400">İvme: Canlı</span>
                <span class="px-3 py-1 bg-slate-800 rounded-md text-xs text-slate-400">Sistem: Aktif</span>
            </div>
        </div>

    </div>

    <div class="max-w-5xl mx-auto mt-8 stat-card p-8 rounded-3xl overflow-hidden">
        <h3 class="text-lg font-semibold text-slate-400 mb-6">24 Saatlik Sıcaklık Analizi</h3>
        <div class="h-48 w-full border-b border-l border-slate-700 flex items-end justify-between px-2">
            <div class="w-8 bg-emerald-500/20 h-[40%] rounded-t-sm"></div>
            <div class="w-8 bg-emerald-500/30 h-[55%] rounded-t-sm"></div>
            <div class="w-8 bg-emerald-500/40 h-[65%] rounded-t-sm"></div>
            <div class="w-8 bg-emerald-500/60 h-[85%] rounded-t-sm border-t-2 border-emerald-400"></div>
            <div class="w-8 bg-emerald-500/40 h-[60%] rounded-t-sm"></div>
            <div class="w-8 bg-emerald-500/20 h-[45%] rounded-t-sm"></div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyD8KOoCj6d_eDM_ew5Q-11ldosnuZPhqIk",
            authDomain: "agro-core-ec731.firebaseapp.com",
            projectId: "agro-core-ec731",
            databaseURL: "https://agro-core-ec731-default-rtdb.firebaseio.com/",
            storageBucket: "agro-core-ec731.firebasestorage.app",
            messagingSenderId: "1032021740952",
            appId: "1:1032021740952:web:c8d08c50b65b2099f0efed"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        database.ref('cihaz1').on('value', (snapshot) => {
            const data = snapshot.val();
            if (data) {
                // Sıcaklık güncelleme
                document.getElementById('temp-val').innerText = data.sicaklik;
                
                // Hareket durumu güncelleme
                document.getElementById('activity-status').innerText = data.hareket;

                // Son güncelleme saatini yaz
                const simdi = new Date();
                document.getElementById('last-update').innerText = "Son güncelleme: " + simdi.toLocaleTimeString();

                // Görsel detay: Sıcaklık barını biraz oynatalım
                const barWidth = Math.min(Math.max((data.sicaklik - 30) * 10, 0), 100);
                document.getElementById('temp-bar').style.width = barWidth + "%";
                
                // Sıcaklık durum yazısı
                const statusTxt = document.getElementById('temp-status');
                if(data.sicaklik > 39) {
                    statusTxt.innerText = "Yüksek";
                    statusTxt.className = "text-red-500 font-bold";
                } else {
                    statusTxt.innerText = "Normal";
                    statusTxt.className = "text-emerald-400 font-bold";
                }
            }
        });
    </script>
</body>
</html>
