<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agro Core - Canlı Takip</title>
    <style>
        body { font-family: sans-serif; background-color: #f0f2f5; text-align: center; padding: 20px; }
        .container { max-width: 1100px; margin: auto; background: white; padding: 20px; border-radius: 15px; shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; }
        .card { border: 1px solid #ddd; padding: 10px; border-radius: 10px; background: #fff; }
        h1 { color: #1b4f72; }
        h3 { color: #2e86c1; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Agro Core Canlı İzleme Paneli</h1>
    <p>Akıllı İnek Takip Bilekliği - Veri Analiz Sistemi</p>

    <div class="grid">
        <div class="card">
            <h3>Vücut Sıcaklığı</h3>
            <iframe width="350" height="210" style="border: none;" src="https://thingspeak.com/channels/3355710/charts/1?bgcolor=%23ffffff&color=%23d62020&dynamic=true&results=30&title=Sıcaklık+(C)&type=line"></iframe>
        </div>

        <div class="card">
            <h3>Aktivite Seviyesi</h3>
            <iframe width="350" height="210" style="border: none;" src="https://thingspeak.com/channels/3355710/charts/2?bgcolor=%23ffffff&color=%233498db&dynamic=true&results=30&title=Hareket&type=line"></iframe>
        </div>

        <div class="card">
            <h3>Sistem Durum Analizi</h3>
            <iframe width="350" height="210" style="border: none;" src="https://thingspeak.com/channels/3355710/charts/3?bgcolor=%23ffffff&color=%23f1c40f&dynamic=true&results=30&title=0:Normal+1:Kızgın+2:Ateş&type=line"></iframe>
        </div>
    </div>

    <div style="margin-top: 30px; color: #7f8c8d;">
        <p><strong>Not:</strong> Durum Analizi grafiğinde 1 Kızgınlık, 2 ise Yüksek Ateş anlamına gelir.</p>
    </div>
</div>

</body>
</html>
