<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>AgroCore | Yönetim Paneli</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); }
        body { background-color: #0b0f1a; color: white; }
    </style>
</head>
<body>

    <div id="login-screen" class="min-h-screen flex items-center justify-center p-6">
        <div class="glass p-10 rounded-3xl w-full max-w-md text-center">
            <h1 class="text-4xl font-bold text-emerald-500 mb-2">AgroCore</h1>
            <p class="text-gray-400 mb-8">Tarımın Geleceğine Giriş Yapın</p>
            
            <input type="email" id="user-email" placeholder="Gmail Adresiniz" 
                   class="w-full bg-slate-900 border border-slate-700 p-3 rounded-xl mb-4 focus:border-emerald-500 outline-none">
            
            <button onclick="loginKontrol()" class="w-full bg-emerald-600 hover:bg-emerald-500 p-3 rounded-xl font-bold transition">
                Giriş Yap / Üye Ol
            </button>
            
            <div class="mt-6 flex items-center justify-center gap-2 text-sm text-gray-500">
                <div class="h-[1px] w-10 bg-gray-700"></div>
                <span>veya</span>
                <div class="h-[1px] w-10 bg-gray-700"></div>
            </div>

            <button class="mt-4 flex items-center justify-center gap-2 w-full bg-white text-black p-3 rounded-xl font-semibold hover:bg-gray-200 transition">
                <img src="https://www.google.com/favicon.ico" class="w-4 h-4"> Google ile Devam Et
            </button>
        </div>
    </div>

    <div id="main-panel" class="hidden p-8">
        <h2 class="text-2xl font-bold">Hoş Geldin, <span id="user-display"></span></h2>
        <div class="grid grid-cols-2 gap-6 mt-8">
            <div class="glass p-8 rounded-2xl">
                <h3>Vücut Sıcaklığı</h3>
                <p id="web-sicaklik" class="text-5xl font-mono text-emerald-400">--</p>
            </div>
            <div class="glass p-8 rounded-2xl">
                <h3>Hareket Aktivitesi</h3>
                <p id="web-hareket" class="text-5xl font-mono text-blue-400">--</p>
            </div>
        </div>
    </div>

    <script>
        // --- İSTASYON VERİLERİ ALANI ---
        // Bileklik hazır olduğunda ESP32 üzerinden gelen veriler buraya akacak.
        let ISTASYON_VERILERI = {
            sicaklik: "38.5",
            hareket: "Yüksek",
            cihazDurumu: "Aktif",
            sonGuncelleme: new Date().toLocaleTimeString()
        };

        function loginKontrol() {
            const email = document.getElementById('user-email').value;
            
            // Gmail kontrolü (Saçma mailleri engeller)
            if (email.includes("@gmail.com") && email.length > 12) {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('main-panel').classList.remove('hidden');
                document.getElementById('user-display').innerText = email.split('@')[0];
                
                // Panel açılınca verileri yükle
                verileriGuncelle();
            } else {
                alert("Lütfen geçerli bir @gmail.com adresi giriniz!");
            }
        }

        function verileriGuncelle() {
            // İleride burası Firebase veya ESP32'den canlı veri çekecek
            document.getElementById('web-sicaklik').innerText = ISTASYON_VERILERI.sicaklik + "°C";
            document.getElementById('web-hareket').innerText = ISTASYON_VERILERI.hareket;
        }
    </script>
</body>
</html>
